<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Isabele Mariana Nails - Login">
    <title>Login - Isabele Mariana Nails</title>
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="app-container">
        <main class="login-main">
            <!-- Header with Back + Home -->
            <header class="login-header">
                <nav class="login-nav">
                    <h1 class="login-title">Login</h1>
                </nav>
            </header>

            <!-- Formulário -->
            <section class="login-form-section">
                <form class="login-form" id="loginForm" novalidate>
                    <!-- Campo Nome/Email -->
                    <div class="login-form-group">
                        <label for="emailInput" class="login-label">E-mail</label>
                        <input type="email" id="emailInput" class="login-input" placeholder="seu@email.com" required aria-label="Email para login">
                    </div>

                    <!-- Campo Senha -->
                    <div class="login-form-group">
                        <label for="passwordInput" class="login-label">Senha</label>
                        <input type="password" id="passwordInput" class="login-input" placeholder="Digite sua senha" required aria-label="Senha para login">
                    </div>

                    <!-- Botão Login -->
                    <button type="submit" class="login-button login-button--primary">
                        Login
                    </button>

                    <!-- Link: Esqueci a senha -->
                    <div style="margin-top:8px;text-align:right">
                        <a href="esqueci-senha.html" class="login-link">Esqueceu a senha?</a>
                    </div>
                </form>
            </section>

            <!-- Divisor (opcional) -->
            <div class="login-divider"></div>

            <!-- Login com Google -->
            <section class="login-social-section">
                <button type="button" class="login-button login-button--google" id="googleLoginBtn">
                    <svg class="login-google-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" />
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
                    </svg>
                    <span>Login com o Google</span>
                </button>
            </section>

            <!-- Link para Registro -->
            <footer class="login-footer">
                <p class="login-footer-text">
                    Não tem uma conta?
                    <a href="registro.html" class="login-link login-link--highlight">Registre-se</a>
                </p>
            </footer>
        </main>
    </div>
    <script type="module" src="login.js"></script>
    <script src="app.js" defer></script>
</body>

</html>
