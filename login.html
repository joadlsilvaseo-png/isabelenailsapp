<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Acesse sua conta na Isabele Mariana Nails.">

    <meta name="theme-color" content="#591c31">

    <meta name="mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>Login | Isabele Mariana Nails</title>

    <link rel="manifest" href="./manifest.json">

    <link rel="icon" type="image/png" href="./assets/favicon.png">

    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="base.css?v=1.0.4">

    <link rel="stylesheet" href="login.css?v=2.0.0">
</head>

<body data-page="login">

    <div class="app-container">

        <span class="login-decoration login-decoration--top" aria-hidden="true"></span>

        <span class="login-decoration login-decoration--bottom" aria-hidden="true"></span>

        <main class="login-main">

            <header class="login-header">

                <nav class="login-nav" aria-label="Navegação do login">
                    <a href="index.html" data-back="history" class="login-nav-link" aria-label="Voltar">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </a>

                    <h1 class="login-title">
                        Login
                    </h1>

                    <a href="index.html" class="login-nav-link" aria-label="Página inicial">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M4 10L12 3L20 10V20C20 20.5523 19.5523 21 19 21H5C4.44772 21 4 20.5523 4 20V10Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />

                            <path d="M9 21V13H15V21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </a>
                </nav>

                <section class="login-brand-card">

                    <div class="login-logo-wrapper">
                        <img src="./assets/logo-isabele-mariana.png" alt="Logo Isabele Mariana Nails" class="login-logo" width="239" height="167">
                    </div>

                    <div class="login-brand-content">
                        <span class="login-eyebrow">
                            Área da cliente
                        </span>

                        <h2>
                            Bem-vinda de volta
                        </h2>

                        <p>
                            Entre para acompanhar seus agendamentos e escolher
                            seu próximo serviço.
                        </p>
                    </div>

                </section>

            </header>

            <section class="login-card" aria-labelledby="login-card-title">
                <header class="login-card-header">
                    <span class="login-card-eyebrow">
                        Acesse sua conta
                    </span>

                    <h2 id="login-card-title">
                        Informe seus dados
                    </h2>

                    <p>
                        Utilize o e-mail e a senha cadastrados.
                    </p>
                </header>

                <form class="login-form" id="loginForm" novalidate>

                    <div class="login-form-group">
                        <label for="emailInput" class="login-label">
                            E-mail
                        </label>

                        <div class="login-input-wrapper">
                            <span class="login-input-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <path d="M4 6H20V18H4V6Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />

                                    <path d="M4 7L12 13L20 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                            </span>

                            <input type="email" id="emailInput" class="login-input" placeholder="seu@email.com" autocomplete="email" inputmode="email" aria-label="E-mail para login" required>
                        </div>
                    </div>

                    <div class="login-form-group">
                        <div class="login-label-row">
                            <label for="passwordInput" class="login-label">
                                Senha
                            </label>

                            <a href="esqueci-senha.html" class="login-link login-link--forgot">
                                Esqueceu a senha?
                            </a>
                        </div>

                        <div class="login-input-wrapper">
                            <span class="login-input-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <rect x="5" y="10" width="14" height="11" rx="3" stroke="currentColor" stroke-width="1.8" />

                                    <path d="M8 10V7C8 4.8 9.8 3 12 3C14.2 3 16 4.8 16 7V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />

                                    <path d="M12 14V17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                                </svg>
                            </span>

                            <input type="password" id="passwordInput" class="login-input" placeholder="Digite sua senha" autocomplete="current-password" aria-label="Senha para login" required>
                        </div>
                    </div>

                    <button type="submit" class="login-button login-button--primary">
                        <span>Entrar na minha conta</span>

                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>

                </form>

                <div class="login-divider">
                    <span></span>
                    <p>ou continue com</p>
                    <span></span>
                </div>

                <section class="login-social-section">
                    <button type="button" class="login-button login-button--google" id="googleLoginBtn">
                        <svg class="login-google-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M22.56 12.25C22.56 11.47 22.49 10.72 22.36 10H12V14.26H17.92C17.66 15.63 16.88 16.79 15.71 17.57V20.34H19.28C21.36 18.42 22.56 15.6 22.56 12.25Z" fill="#4285F4" />

                            <path d="M12 23C14.97 23 17.46 22.02 19.28 20.34L15.71 17.57C14.73 18.23 13.48 18.63 12 18.63C9.14 18.63 6.71 16.7 5.84 14.1H2.18V16.94C3.99 20.53 7.7 23 12 23Z" fill="#34A853" />

                            <path d="M5.84 14.09C5.62 13.43 5.49 12.73 5.49 12C5.49 11.27 5.62 10.57 5.84 9.91V7.07H2.18C1.43 8.55 1 10.22 1 12C1 13.78 1.43 15.45 2.18 16.93L5.03 14.71L5.84 14.09Z" fill="#FBBC05" />

                            <path d="M12 5.38C13.62 5.38 15.06 5.94 16.21 7.02L19.36 3.87C17.45 2.09 14.97 1 12 1C7.7 1 3.99 3.47 2.18 7.07L5.84 9.91C6.71 7.31 9.14 5.38 12 5.38Z" fill="#EA4335" />
                        </svg>

                        <span>Entrar com o Google</span>
                    </button>
                </section>

                <footer class="login-footer">
                    <p class="login-footer-text">
                        Ainda não possui uma conta?

                        <a href="registro.html" class="login-link login-link--highlight">
                            Cadastre-se
                        </a>
                    </p>
                </footer>

            </section>

        </main>
    </div>

    <script type="module" src="login.js?v=2.0.0"></script>

    <script src="app.js?v=2.0.0" defer></script>

</body>

</html>
