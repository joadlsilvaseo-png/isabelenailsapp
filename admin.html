<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Isabele Nails</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin-style.css">
</head>

<body>

  <div class="app-background">
    <header class="admin-header">
      <a href="dashboard.html" class="btn-back" id="btn-voltar-admin" aria-label="Voltar para Dashboard">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
      <h2>Painel de Agendamentos</h2>
      <a href="login.html" class="btn-home" aria-label="Sair para Login">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 10L12 3L20 10V20C20 20.5523 19.5523 21 19 21H5C4.44772 21 4 20.5523 4 20V10Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M9 21V13H15V21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
    </header>

    <main class="admin-card">
      <div class="card-header">
        <h3>Próximos Horários</h3>
        <p>Confira e gerencie os agendamentos das suas clientes.</p>
      </div>

      <section class="agenda-lista" id="listaAgendamentos">
        <div class="loading">Carregando agendamentos...</div>
      </section>
    </main>
  </div>

  <script type="module" src="admin.js"></script>

</body>

</html>
