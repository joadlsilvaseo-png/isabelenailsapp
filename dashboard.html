<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Isabele Mariana | Isabele Mariana Nails</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="admin-style.css">
  <link rel="stylesheet" href="dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Mantemos apenas o loading screen aqui por ser uma sobreposição crítica */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #2d0b19;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-weight: 600;
      color: #FFD9E7;
    }

    .filters {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      /* Garante que não quebre em telas muito pequenas */
    }

    /* Diminuir o tamanho dos botões e seletores */
    .btn-admin {
      font-size: 12px !important;
      padding: 6px 10px !important;
      height: auto !important;
      min-height: unset !important;
      width: auto !important;
      border-radius: 8px !important;
    }
  </style>
</head>

<body>
  <div id="loading-screen">Verificando Credenciais...</div>
  <div class="dashboard-container">
    <header class="admin-header" style="max-width: none; margin-bottom: 10px;">
      <a href="login.html" class="btn-back" aria-label="Sair">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
      <h2 style="font-family: 'Urbanist', sans-serif; font-size: 22px;">Painel B.I.</h2>
      <a href="login.html" class="btn-home" aria-label="Logout">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 10L12 3L20 10V20C20 20.5523 19.5523 21 19 21H5C4.44772 21 4 20.5523 4 20V10Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M9 21V13H15V21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
    </header>

    <div style="display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 20px;">
      <div class="filters">
        <select id="filter-year" class="btn-admin filter-select">
          <option value="Geral" selected>Ano</option>
        </select>
        <select id="filter-month" class="btn-admin filter-select">
          <option value="Geral" selected>Mês</option>
          <option value="01">Janeiro</option>
          <option value="02">Fevereiro</option>
          <option value="03">Março</option>
          <option value="04">Abril</option>
          <option value="05">Maio</option>
          <option value="06">Junho</option>
          <option value="07">Julho</option>
          <option value="08">Agosto</option>
          <option value="09">Setembro</option>
          <option value="10">Outubro</option>
          <option value="11">Novembro</option>
          <option value="12">Dezembro</option>
        </select>
      </div>
      <p id="current-month-label" class="period-label"></p>
      <a href="admin.html" class="btn-admin" style="min-width: 260px; padding: 14px 30px; text-align: center; font-size: 14px;">Meus Agendamentos</a>
    </div>

    <main class="metrics-grid">
      <div class="card card-revenue">
        <div class="card-header-row">
          <h3>Receita do Mês</h3>
          <span class="card-pill">Atendimentos</span>
        </div>
        <div id="valor-receita" class="value">R$ 0,00</div>
        <div class="card-meta-row">
          <div class="meta-block">
            <span class="meta-label">Total atendimentos</span>
            <span id="total-atendimentos" class="meta-value">0</span>
          </div>
        </div>
      </div>

      <div class="card card-cancelamento">
        <div class="card-header-row">
          <h3>Taxa de Cancelamento</h3>
          <span class="card-pill">Status</span>
        </div>
        <div id="valor-cancelamento" class="value">0%</div>
        <div class="card-chart">
          <canvas id="cancelamentoChart"></canvas>
        </div>
      </div>

      <div class="card card-top-clientes">
        <div class="card-header-row">
          <h3>Top Clientes</h3>
          <span class="card-pill">Pedidos</span>
        </div>
        <div class="card-chart">
          <canvas id="topClientesChart"></canvas>
        </div>
      </div>
    </main>

    <section class="chart-section" style="height: auto; min-height: 350px; display: flex; flex-direction: column; align-items: center;">
      <h3 style="color: var(--rosa-detalhe); margin-bottom: 20px; text-transform: uppercase; font-size: 14px; letter-spacing: 1px;">Distribuição de Serviços</h3>
      <div style="width: 100%; max-width: 300px;"><canvas id="servicesChart"></canvas></div>
    </section>

    <section class="dashboard-actions" style="margin-top: 20px;">
      <a href="principal.html" style="text-align: center; color: var(--vinho); font-weight: 500;">Voltar</a>
    </section>
  </div>

  <script type="module" src="dashboard.js"></script>
</body>

</html>
