<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Conheça e escolha os procedimentos de manicure da Isabele Mariana Nails">

  <meta name="theme-color" content="#591c31">

  <title>Manicure | Isabele Mariana Nails</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="base.css?v=1.0.3">
  <link rel="stylesheet" href="manicure.css?v=2.0.0">
</head>

<body data-page="manicure">

  <div class="app-container">

    <header class="manicure-header" aria-label="Navegação da página">
      <a href="principal.html" data-back="history" class="manicure-nav-link" aria-label="Voltar">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>

      <h1 class="manicure-title">
        Manicure
      </h1>

      <a href="principal.html" class="manicure-nav-link" aria-label="Página principal">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 10L12 3L20 10V20C20 20.5523 19.5523 21 19 21H5C4.44772 21 4 20.5523 4 20V10Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />

          <path d="M9 21V13H15V21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
    </header>

    <main class="manicure-main">

      <section class="manicure-intro">

        <span class="manicure-intro-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M9 9H15C16.1 9 17 9.9 17 11V19C17 20.1 16.1 21 15 21H9C7.9 21 7 20.1 7 19V11C7 9.9 7.9 9 9 9Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />

            <path d="M10 9V5H14V9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />

            <path d="M9 5H15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />

            <path d="M10 13H14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </span>

        <div class="manicure-intro-content">
          <span class="manicure-eyebrow">
            Categoria
          </span>

          <h2>
            Cuidado e acabamento para suas mãos
          </h2>

          <p>
            Escolha o procedimento ideal para manter suas
            unhas cuidadas, bonitas e com acabamento impecável.
          </p>
        </div>

      </section>

      <section class="manicure-services" aria-labelledby="procedimento-title">
        <div class="manicure-section-heading">

          <div>
            <span class="manicure-eyebrow">
              Procedimentos
            </span>

            <h2 id="procedimento-title">
              Serviços disponíveis
            </h2>
          </div>

          <span id="manicure-service-count" class="manicure-service-count" aria-live="polite">
            Carregando
          </span>

        </div>

        <ul id="lista-servicos" class="manicure-list loading" aria-live="polite" aria-busy="true">
          <li class="manicure-skeleton" aria-hidden="true">
            <span class="manicure-skeleton-icon"></span>

            <span class="manicure-skeleton-content">
              <span class="manicure-skeleton-line"></span>

              <span class="manicure-skeleton-line manicure-skeleton-line--large"></span>

              <span class="manicure-skeleton-line manicure-skeleton-line--medium"></span>
            </span>
          </li>

          <li class="manicure-skeleton" aria-hidden="true">
            <span class="manicure-skeleton-icon"></span>

            <span class="manicure-skeleton-content">
              <span class="manicure-skeleton-line"></span>

              <span class="manicure-skeleton-line manicure-skeleton-line--large"></span>

              <span class="manicure-skeleton-line manicure-skeleton-line--medium"></span>
            </span>
          </li>

          <li class="manicure-skeleton" aria-hidden="true">
            <span class="manicure-skeleton-icon"></span>

            <span class="manicure-skeleton-content">
              <span class="manicure-skeleton-line"></span>

              <span class="manicure-skeleton-line manicure-skeleton-line--large"></span>

              <span class="manicure-skeleton-line manicure-skeleton-line--medium"></span>
            </span>
          </li>
        </ul>

      </section>

      <footer class="manicure-footer">

        <p id="selected-service-summary" class="manicure-selection-summary" aria-live="polite">
          Selecione um procedimento para continuar
        </p>

        <button type="button" class="manicure-button" disabled>
          <span>Continuar para agendamento</span>

          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>

      </footer>

    </main>

  </div>

  <script type="module" src="manicure.js?v=2.0.0"></script>

  <script src="app.js?v=1.0.3" defer></script>

</body>

</html>
